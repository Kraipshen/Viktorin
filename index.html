<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCraft — Платформа викторин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .quiz-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

<nav class="sticky top-0 z-50 glass border-b border-slate-200 px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="window.showView('home')">
            <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center text-white"><i class="fas fa-bolt"></i></div>
            <span class="text-2xl font-bold tracking-tight">Quiz<span class="text-indigo-600">Craft</span></span>
        </div>
        <div class="hidden md:flex space-x-8 font-medium">
            <button onclick="window.showView('home')" class="hover:text-indigo-600">Главная</button>
            <button onclick="window.showView('create')" class="hover:text-indigo-600">Создать</button>
            <button onclick="window.showView('join')" class="hover:text-indigo-600">Войти в игру</button>
        </div>
        <div id="user-status" class="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">Подключение...</div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-6 py-12">
    <!-- Главная -->
    <section id="view-home" class="view space-y-12">
        <div class="text-center space-y-6">
            <h1 class="text-5xl font-extrabold tracking-tight">Интерактивные викторины <br><span class="text-indigo-600">для каждого</span></h1>
            <p class="text-slate-500 text-lg">Создавайте тесты и делитесь ими мгновенно.</p>
            <div class="flex justify-center space-x-4">
                <button onclick="window.showView('create')" class="px-8 py-4 gradient-bg text-white font-bold rounded-2xl shadow-lg">Создать викторину</button>
                <button onclick="window.showView('join')" class="px-8 py-4 bg-white border border-slate-200 font-bold rounded-2xl">Ввести код</button>
            </div>
        </div>
        <div class="grid md:grid-cols-3 gap-8 pt-10">
            <div class="p-8 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                <i class="fas fa-rocket text-indigo-500 text-3xl mb-4"></i>
                <h3 class="font-bold">Быстрый запуск</h3>
            </div>
            <div class="p-8 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                <i class="fas fa-link text-purple-500 text-3xl mb-4"></i>
                <h3 class="font-bold">Удобные ссылки</h3>
            </div>
            <div class="p-8 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                <i class="fas fa-cloud text-emerald-500 text-3xl mb-4"></i>
                <h3 class="font-bold">Облачное хранение</h3>
            </div>
        </div>
    </section>

    <!-- Создание -->
    <section id="view-create" class="view hidden animate-fade-in">
        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6">
            <h2 class="text-2xl font-bold">Новая викторина</h2>
            <input type="text" id="quiz-title" placeholder="Введите название (напр. География)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
            <div id="questions-container" class="space-y-6"></div>
            <button onclick="window.addQuestion()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 hover:text-indigo-600 transition">+ Добавить вопрос</button>
            <button onclick="window.saveQuiz()" id="btn-save" class="w-full py-4 gradient-bg text-white font-bold rounded-2xl shadow-xl hover:opacity-90 transition">Опубликовать</button>
        </div>
    </section>

    <!-- Присоединение -->
    <section id="view-join" class="view hidden animate-fade-in max-w-md mx-auto text-center space-y-6">
        <div class="bg-white p-10 rounded-3xl border border-slate-200 shadow-xl">
            <h2 class="text-2xl font-bold mb-6">Присоединиться</h2>
            <input type="text" id="join-input" placeholder="Введите ID игры или ссылку" class="w-full px-4 py-4 text-center text-xl font-bold uppercase rounded-2xl border border-slate-200 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="window.handleJoin()" class="w-full py-4 gradient-bg text-white font-bold rounded-2xl shadow-lg">Начать игру</button>
        </div>
    </section>

    <!-- Игра -->
    <section id="view-play" class="view hidden max-w-2xl mx-auto"></section>

    <!-- Результат -->
    <section id="view-results" class="view hidden text-center animate-fade-in"></section>
</main>

<div id="notification" class="fixed bottom-8 right-8 transform translate-y-24 opacity-0 transition-all duration-300 z-50 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl">
    <span id="notification-msg"></span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ТВОЙ КОНФИГ ИЗ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBh_5XMtBMz5cTdCSLFbmywV0TOSKXTWYc",
        authDomain: "vikyorina.firebaseapp.com",
        projectId: "vikyorina",
        storageBucket: "vikyorina.firebasestorage.app",
        messagingSenderId: "465481199981",
        appId: "1:465481199981:web:68233b69a4ea1e29066a64",
        measurementId: "G-RQPP73LCJD"
    };

    const appId = "viktorina_app"; // Уникальный префикс для коллекции
    let db, auth, currentUser = null;

    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        signInAnonymously(auth);
        onAuthStateChanged(auth, u => {
            currentUser = u;
            document.getElementById('user-status').innerHTML = u ? `<i class="fas fa-check-circle text-emerald-500 mr-1"></i> Соединение активно` : "Ошибка входа";
        });
    } catch(e) {
        document.getElementById('user-status').innerText = "Ошибка Firebase";
    }

    let qCount = 0;

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-'+id)?.classList.remove('hidden');
        window.scrollTo(0, 0);
        if(id === 'create' && qCount === 0) window.addQuestion();
    };

    window.addQuestion = () => {
        qCount++;
        const div = document.createElement('div');
        div.className = "p-6 bg-slate-50 rounded-2xl border border-slate-200 space-y-4 relative animate-fade-in";
        div.id = `q-${qCount}`;
        div.innerHTML = `
            <div class="flex justify-between items-center">
                <span class="font-bold text-indigo-600">Вопрос #${qCount}</span>
                <button onclick="document.getElementById('q-${qCount}').remove()" class="text-slate-300 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" placeholder="Текст вопроса" class="q-txt w-full px-4 py-2 rounded-lg border focus:border-indigo-500 outline-none">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                ${[0,1,2,3].map(i => `<input type="text" placeholder="Вариант ${i+1}" class="opt-${i} w-full px-3 py-2 rounded-lg border text-sm">`).join('')}
            </div>
            <select class="q-correct w-full px-3 py-2 rounded-lg border text-sm bg-white">
                <option value="0">Правильный ответ: 1</option>
                <option value="1">Правильный ответ: 2</option>
                <option value="2">Правильный ответ: 3</option>
                <option value="3">Правильный ответ: 4</option>
            </select>
        `;
        document.getElementById('questions-container').appendChild(div);
    };

    window.saveQuiz = async () => {
        if(!db) return window.notify("Сначала настройте Firebase!");
        const title = document.getElementById('quiz-title').value.trim();
        const blocks = document.querySelectorAll('[id^="q-"]');
        const questions = [];
        
        blocks.forEach(b => {
            const text = b.querySelector('.q-txt').value.trim();
            const options = [0,1,2,3].map(i => b.querySelector('.opt-'+i).value.trim());
            const correct = parseInt(b.querySelector('.q-correct').value);
            if(text && options.every(o => o)) questions.push({text, options, correctIndex: correct});
        });

        if(!title || !questions.length) return window.notify("Заполните все поля и варианты");

        const btn = document.getElementById('btn-save');
        btn.disabled = true; btn.innerText = "Публикация...";

        try {
            const path = `artifacts/${appId}/public/data/quizzes`;
            const ref = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'quizzes'), {
                title, questions, author: currentUser.uid, date: new Date().toISOString()
            });

            const fullUrl = window.location.origin + window.location.pathname + "?quizId=" + ref.id;

            document.getElementById('view-create').innerHTML = `
                <div class="text-center p-12 bg-white rounded-3xl border shadow-xl space-y-6 animate-fade-in">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto text-2xl">
                        <i class="fas fa-check"></i>
                    </div>
                    <h2 class="text-2xl font-bold">Викторина создана!</h2>
                    <p class="text-slate-500">Поделитесь этим ID или ссылкой:</p>
                    <div class="flex items-center space-x-2 bg-slate-50 p-4 rounded-xl border">
                        <code class="flex-1 text-indigo-600 font-bold">${ref.id}</code>
                        <button onclick="window.copyText('${ref.id}')" class="text-slate-400 hover:text-indigo-600"><i class="fas fa-copy"></i></button>
                    </div>
                    <button onclick="window.copyText('${fullUrl}')" class="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold">Копировать полную ссылку</button>
                    <button onclick="location.reload()" class="w-full py-3 gradient-bg text-white rounded-xl font-bold shadow-lg">Вернуться на главную</button>
                </div>
            `;
            window.notify("Успешно сохранено!");
        } catch(e) { 
            console.error(e);
            window.notify("Ошибка доступа к БД. Проверьте Rules в Firebase!"); 
            btn.disabled = false; 
            btn.innerText = "Опубликовать"; 
        }
    };

    window.handleJoin = () => {
        const input = document.getElementById('join-input').value.trim();
        if(!input) return;
        let id = input;
        if(input.includes('quizId=')) id = input.split('quizId=')[1].split('&')[0];
        window.startQuiz(id);
    };

    window.startQuiz = async (id) => {
        try {
            window.notify("Загрузка...");
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'quizzes', id));
            if(!snap.exists()) return window.notify("Викторина не найдена");
            
            const quiz = snap.data();
            let idx = 0, score = 0;
            
            const render = () => {
                const q = quiz.questions[idx];
                const cont = document.getElementById('view-play');
                window.showView('play');
                cont.innerHTML = `
                    <div class="space-y-6 animate-fade-in">
                        <div class="flex justify-between items-center text-sm font-bold text-slate-400">
                            <span>ВОПРОС ${idx + 1} ИЗ ${quiz.questions.length}</span>
                            <span>СЧЕТ: ${score}</span>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow-sm space-y-8">
                            <h3 class="text-2xl font-bold text-slate-800">${q.text}</h3>
                            <div class="grid gap-3">
                                ${q.options.map((o, i) => `<button onclick="window.ans(${i})" class="w-full text-left p-5 border-2 border-slate-50 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition font-medium">${o}</button>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
                window.ans = (i) => {
                    if(i === q.correctIndex) score++;
                    idx++;
                    if(idx < quiz.questions.length) render();
                    else finish();
                };
            };

            const finish = () => {
                window.showView('results');
                document.getElementById('view-results').innerHTML = `
                    <div class="bg-white p-12 rounded-3xl border shadow-xl space-y-6">
                        <h2 class="text-3xl font-bold">Результаты</h2>
                        <div class="text-6xl font-black text-indigo-600">${score} / ${quiz.questions.length}</div>
                        <p class="text-slate-500">${score === quiz.questions.length ? 'Идеально!' : 'Хорошая попытка!'}</p>
                        <button onclick="location.reload()" class="w-full py-4 gradient-bg text-white rounded-2xl font-bold shadow-lg">На главную</button>
                    </div>
                `;
            };

            render();
        } catch(e) { window.notify("Ошибка загрузки данных"); }
    };

    window.copyText = (t) => {
        const el = document.createElement('textarea');
        el.value = t;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        window.notify("Скопировано!");
    };

    window.notify = (m) => {
        const n = document.getElementById('notification');
        document.getElementById('notification-msg').innerText = m;
        n.classList.remove('translate-y-24', 'opacity-0');
        setTimeout(() => n.classList.add('translate-y-24', 'opacity-0'), 3000);
    };

    const params = new URLSearchParams(window.location.search);
    if(params.get('quizId')) window.startQuiz(params.get('quizId'));
</script>
</body>
</html>
